openapi: 3.0.3
info:
  title: Webdom Agent API
  version: 0.1.0
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  description: |
    Machine-oriented API for AI agents operating on the Webdom marketplace.

    Principles:
    - public read API where possible;
    - authenticated access via TON Proof challenge exchange into a bearer API token;
    - normalized read models for domains, deals, offers, users, analytics, and history.
    - authenticated requests are limited to 5 requests per second with burst 20, enforced per authenticated wallet and per client IP.
    - unauthenticated requests are limited to 1 request per second per client IP.

    Operational notes:
    - any endpoint in this API may return `429 Too Many Requests` when either the wallet-scoped or IP-scoped limiter is exceeded;
    - the default limit can be increased on request; contact `t.me/domainer`.
servers:
  - url: https://webdom.market/api/agent/v1
    description: Production
  - url: /api/agent/v1
    description: Relative to current host
tags:
  - name: Auth
    description: Authentication helpers for TON Connect and TON Proof.
  - name: Marketplace
    description: Marketplace configuration and deploy parameters.
  - name: Catalog
    description: Search and discovery endpoints.
  - name: Domains
    description: Canonical domain read models and domain-specific analytics/history.
  - name: Deals
    description: Canonical deal models, bid history, and lifecycle history.
  - name: Offers
    description: Offer lookup and best-offer endpoints.
  - name: Users
    description: Public profiles and user activity.
  - name: Analytics
    description: Minimal agent-oriented market and comparable analytics.
  - name: History
    description: Global normalized event and transaction feeds.
security:
  - {}
paths:
  /auth/ton-proof/payload:
    get:
      tags: [Auth]
      operationId: getTonProofPayload
      summary: Get TON Proof challenge for agent authentication
      description: |
        Returns a single-use payload that the agent must sign via TON Proof.
        The payload is short-lived and is later exchanged for a bearer API token.
      responses:
        '200':
          description: TON Proof challenge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TonProofChallengeEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/ton-proof/tokens:
    post:
      tags: [Auth]
      operationId: exchangeTonProofForToken
      summary: Exchange TON Proof for an agent API token
      description: |
        Verifies wallet ownership via TON Proof and issues a bearer API token bound to
        the authenticated wallet. The plaintext token is returned only once at creation time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TonProofTokenExchangeRequest'
      responses:
        '200':
          description: Agent API token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentApiTokenEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/tokens/current:
    delete:
      tags: [Auth]
      operationId: revokeCurrentToken
      summary: Revoke the current agent API token
      security:
        - AgentBearerAuth: []
      responses:
        '200':
          description: Agent API token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRevocationEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /marketplace/config:
    get:
      tags: [Marketplace]
      operationId: getMarketplaceConfig
      summary: Get marketplace deploy configuration
      description: |
        Returns the current marketplace deploy configuration, including deploy fees,
        commission rates, and per-contract deployment constraints.
      responses:
        '200':
          description: Marketplace configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceConfigEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /catalog/domains:
    get:
      tags: [Catalog]
      operationId: listDomains
      summary: Search domains
      description: |
        Machine-oriented domain discovery endpoint with cursor pagination.
        All query parameters are optional unless explicitly marked as required.
        Response shaping rules:
        - The endpoint returns only domains produced by the requested filtering and sorting.
        - No pinned or promoted domains are injected into the first page or any later page.
        - No `pinned_count` or similar out-of-band pinned-domain metadata is returned.
        Cursor contract:
        - `cursor` is an opaque server-generated continuation token.
        - The token is offset-based over the current ordered result set, not snapshot-based.
        - Reuse `next_cursor` only with the same `sort` and the same filter set.
        - Reusing a cursor with a different `sort` returns `400`.
        - If matching rows are inserted, removed, or reordered between requests, duplicates or skips are possible.
        - The end of the feed is indicated by `page_info.has_more = false` and `page_info.next_cursor = null`.
        Sort-key null handling:
        - For `current_price_ton.*`, `last_price_ton.*`, `last_sale_time.*`, `sale_created_at.*`, and `deal_ending_time.*`, rows without the sort key are always placed at the end of the result set (`nulls_last`), regardless of sort direction.
        Multi-value filter semantics:
        - `states`: OR
        - `categories`: OR
        - `marketplaces`: OR
        - `clubs`: OR
        - `dns_record_types`: AND
        - `search` + `regex`: AND when both are provided.
        - `characters`: AND. The following combinations are invalid and return `400`:
          `idn_domains` + `exclude_punycode`,
          `digits_only` + `exclude_digits`,
          `letters_only` + `digits_only`,
          `with_hyphens` + `exclude_hyphens`,
          `hyphen_separated` + `exclude_hyphens`.
      parameters:
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Regex'
        - $ref: '#/components/parameters/DomainZone'
        - name: name_length_min
          in: query
          description: Optional inclusive lower bound for the domain label length, excluding the zone suffix.
          schema:
            type: integer
            minimum: 1
        - name: name_length_max
          in: query
          description: Optional inclusive upper bound for the domain label length, excluding the zone suffix.
          schema:
            type: integer
            minimum: 1
        - name: states
          in: query
          style: form
          explode: true
          description: Optional domain state filters. Multiple values are combined with OR semantics.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DomainStateFilter'
        - name: categories
          in: query
          style: form
          explode: true
          description: Optional category filters. Multiple values are combined with OR semantics.
          schema:
            type: array
            items:
              type: string
        - name: characters
          in: query
          style: form
          explode: true
          description: |
            Optional character-set filters for the label part of the domain. Multiple values are combined with AND semantics.
            The following combinations are invalid and return `400`: `idn_domains` + `exclude_punycode`, `digits_only` + `exclude_digits`, `letters_only` + `digits_only`, `with_hyphens` + `exclude_hyphens`, `hyphen_separated` + `exclude_hyphens`.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/CharacterFilter'
        - name: dns_record_types
          in: query
          style: form
          explode: true
          description: Optional DNS record presence filters. Multiple values are combined with AND semantics.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DnsRecordType'
        - name: clubs
          in: query
          style: form
          explode: true
          description: Optional club-membership filters. Multiple values are combined with OR semantics.
          schema:
            type: array
            items:
              type: string
              enum: [club_10k, club_100k]
        - name: marketplaces
          in: query
          style: form
          explode: true
          description: Marketplace names. Supported values are `webdom`, `getgems`, `fragment`, `marketapp`.
          schema:
            type: array
            items:
              type: string
              enum: [webdom, getgems, fragment, marketapp]
        - $ref: '#/components/parameters/PriceTonMin'
        - $ref: '#/components/parameters/PriceTonMax'
        - name: expiration_before
          in: query
          description: Optional inclusive upper bound for domain expiration time.
          schema:
            type: string
            format: date-time
        - name: expiration_after
          in: query
          description: Optional inclusive lower bound for domain expiration time.
          schema:
            type: string
            format: date-time
        - name: linked_wallet_address
          in: query
          description: Optional filter by the linked wallet address resolved from the domain wallet record.
          schema:
            $ref: '#/components/schemas/AddressObject'
        - name: owner_address
          in: query
          description: Optional filter by the current owner wallet address.
          schema:
            $ref: '#/components/schemas/AddressObject'
        - name: is_banned
          in: query
          description: Optional filter by the domain moderation flag.
          schema:
            type: boolean
        - $ref: '#/components/parameters/SortCatalogDomains'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Domain search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /catalog/domains/available-labels:
    get:
      tags: [Catalog]
      operationId: listAvailableDomainLabels
      summary: Search available .ton labels
      description: |
        Searches the prepared availability snapshot for currently unminted `.ton` labels.
        Cursor contract:
        - `cursor` is an opaque server-generated continuation token.
        - The token binds to the normalized regex, sort order, length filters, boolean filters, first-character filter, dataset tags, dataset categories, and the current snapshot token.
        - Reusing a cursor with different filters or after the snapshot is rebuilt returns `400`.
        - The end of the feed is indicated by `page_info.has_more = false` and `page_info.next_cursor = null`.
      parameters:
        - name: regex
          in: query
          required: true
          description: Regex pattern for the label only, without the `.ton` suffix. Slash delimiters are accepted and normalized before execution.
          schema:
            type: string
        - name: sort_order
          in: query
          description: Lexicographic sort direction for the returned labels.
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: min_len
          in: query
          description: Minimum label length.
          schema:
            type: integer
            minimum: 4
            maximum: 126
            default: 4
        - name: max_len
          in: query
          description: Maximum label length.
          schema:
            type: integer
            minimum: 4
            maximum: 126
            default: 126
        - name: has_digit
          in: query
          description: Filter by whether the label contains at least one digit.
          schema:
            type: boolean
        - name: has_letter
          in: query
          description: Filter by whether the label contains at least one ASCII letter.
          schema:
            type: boolean
        - name: has_hyphen
          in: query
          description: Filter by whether the label contains a hyphen.
          schema:
            type: boolean
        - name: is_idn
          in: query
          description: Filter by whether the label is punycode-encoded (`xn--` prefix).
          schema:
            type: boolean
        - name: is_palindrome
          in: query
          description: Filter by whether the label reads the same forward and backward.
          schema:
            type: boolean
        - name: first_char
          in: query
          description: Optional first-character filter. Must be a single lowercase ASCII letter or digit.
          schema:
            type: string
            minLength: 1
            maxLength: 1
            pattern: '^[a-z0-9]$'
        - name: tags
          in: query
          description: |
            Optional dataset-backed tag filters. Repeat the parameter or send a comma-separated list.
            Minted tags are OR-ed together, WEB2 rank tags are OR-ed together, and different tag groups are combined with AND semantics.
          schema:
            type: array
            items:
              type: string
              enum:
                - eth_minted
                - sol_minted
                - top_100_web2
                - top_200_web2
                - top_500_web2
                - top_1k_web2
                - top_2k_web2
                - top_5k_web2
                - top_10k_web2
                - top_50k_web2
                - top_100k_web2
                - top_200k_web2
                - top_500k_web2
                - top_1m_web2
          style: form
          explode: true
        - name: categories
          in: query
          description: Optional exact-match category filters from `available_domains.csv`. Multiple values are combined with OR semantics.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        '200':
          description: Available label search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableLabelListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /catalog/deals:
    get:
      tags: [Catalog]
      operationId: listDeals
      summary: Search deals
      description: |
        Cursor contract:
        - `cursor` is an opaque server-generated continuation token.
        - The token is offset-based over the current ordered result set, not snapshot-based.
        - Reuse `next_cursor` only with the same `sort` and the same filter set.
        - Reusing a cursor with a different `sort` returns `400`.
        - If matching rows are inserted, removed, or reordered between requests, duplicates or skips are possible.
        - The end of the feed is indicated by `page_info.has_more = false` and `page_info.next_cursor = null`.
        Price-sort handling:
        - For `price_ton.*` and `execution_price.*`, deals without the corresponding sort key are always placed at the end of the result set (`nulls_last`).
        - `domains_swap` rows do not interleave with priced deals for price-based sorts; they remain in the tail portion of the result set.
      parameters:
        - name: types
          in: query
          style: form
          explode: true
          description: Optional deal type filters. Multiple values are combined with OR semantics.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DealType'
        - name: states
          in: query
          style: form
          explode: true
          description: Optional deal state filters. Multiple values are combined with OR semantics.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DealState'
        - name: domain_name
          in: query
          description: Optional exact domain-name filter. Matches deals containing the specified domain.
          schema:
            type: string
        - $ref: '#/components/parameters/DomainZone'
        - name: seller_address
          in: query
          description: Optional filter by seller wallet address.
          schema:
            $ref: '#/components/schemas/AddressObject'
        - name: buyer_address
          in: query
          description: Optional filter by buyer or latest bidder wallet address, depending on deal type.
          schema:
            $ref: '#/components/schemas/AddressObject'
        - name: marketplace_address
          in: query
          description: Optional filter by marketplace contract address.
          schema:
            $ref: '#/components/schemas/AddressObject'
        - name: currency
          in: query
          description: Optional filter by the deal's native pricing currency.
          schema:
            $ref: '#/components/schemas/CurrencyCode'
        - $ref: '#/components/parameters/PriceTonMin'
        - $ref: '#/components/parameters/PriceTonMax'
        - name: created_after
          in: query
          description: Optional inclusive lower bound for deal creation time.
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          description: Optional inclusive upper bound for deal creation time.
          schema:
            type: string
            format: date-time
        - name: expiration_after
          in: query
          description: Optional. Deal expiration lower bound.
          schema:
            type: string
            format: date-time
        - name: expiration_before
          in: query
          description: Optional. Deal expiration upper bound.
          schema:
            type: string
            format: date-time
        - name: is_collection
          in: query
          description: Optional filter for multi-domain deals. `true` keeps collection-like deals; `false` keeps single-domain deals.
          schema:
            type: boolean
        - name: sort
          in: query
          description: Deal ordering mode. Reuse any returned cursor only with the same sort value. `execution_price.*` sorts by TON-normalized execution price.
          schema:
            type: string
            enum:
              - created_at.desc
              - created_at.asc
              - expiration.desc
              - expiration.asc
              - price_ton.desc
              - price_ton.asc
              - execution_price.desc
              - execution_price.asc
            default: created_at.desc
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Deal search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'


  /domains/resolve:
    get:
      tags: [Domains]
      operationId: resolveDomain
      summary: Resolve domain name to wallet-related data
      description: |
        Resolution semantics:
        - `404` means the domain does not exist.
        - `200` with `resolved_wallet_address = null` means the domain exists, but no linked wallet or wallet DNS record is available.
      parameters:
        - name: domain_name
          in: query
          required: true
          description: Required. Domain name to resolve.
          schema:
            type: string
      responses:
        '200':
          description: Resolve result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /domains/back-resolve:
    get:
      tags: [Domains]
      operationId: backResolveDomain
      summary: Back resolve wallet address to domain
      description: |
        Reverse-resolution semantics:
        - `200` with `domain_name = null` means no reverse mapping was found for the provided wallet address.
        - `404` is not used by this endpoint for reverse-resolution misses.
      parameters:
        - name: address
          in: query
          required: true
          description: Required. Wallet address to back resolve.
          schema:
            $ref: '#/components/schemas/AddressObject'
      responses:
        '200':
          description: Back resolve result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackResolveEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /domains/{domain_name}:
    get:
      tags: [Domains]
      operationId: getDomain
      summary: Get domain details
      parameters:
        - $ref: '#/components/parameters/DomainNamePath'
      responses:
        '200':
          description: Domain details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /domains/{domain_name}/history:
    get:
      tags: [Domains]
      operationId: listDomainTransactions
      summary: Get domain transaction history
      description: |
        Ordered by descending blockchain position. Pagination is seek-based via `after_lt`
        and stable tie-breaking is done with transaction hash on equal `lt`.
      parameters:
        - $ref: '#/components/parameters/DomainNamePath'
        - name: action_types
          in: query
          style: form
          explode: true
          description: Optional transaction action-type filters. Multiple values are combined with OR semantics.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DomainActionType'
        - $ref: '#/components/parameters/AfterTime'
        - $ref: '#/components/parameters/BeforeTime'
        - name: after_lt
          in: query
          description: Optional exclusive seek cursor based on blockchain logical time (`lt`) for descending domain-history pagination.
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Domain history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /deals/{deal_address}:
    get:
      tags: [Deals]
      operationId: getDeal
      summary: Get deal details
      parameters:
        - $ref: '#/components/parameters/DealAddressPath'
      responses:
        '200':
          description: Deal details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /deals/{deal_address}/bids:
    get:
      tags: [Deals]
      operationId: listDealBids
      summary: Get auction bid history
      description: |
        Results are ordered by chain position descending: `lt DESC`, then `tx_hash DESC`.
        Cursor contract:
        - `cursor` is an opaque server-generated continuation token.
        - The token is offset-based over the current ordered result set, not snapshot-based.
        - Reuse `next_cursor` only with the same request parameters.
        - If matching rows are inserted, removed, or reordered between requests, duplicates or skips are possible.
        - The end of the feed is indicated by `page_info.has_more = false` and `page_info.next_cursor = null`.
      parameters:
        - $ref: '#/components/parameters/DealAddressPath'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Auction bid history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'


  /offers/{offer_address}:
    get:
      tags: [Offers]
      operationId: getOffer
      summary: Get offer details
      parameters:
        - $ref: '#/components/parameters/OfferAddressPath'
      responses:
        '200':
          description: Offer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /offers/best:
    get:
      tags: [Offers]
      operationId: getBestOffer
      summary: Get best offer for a domain
      description: |
        Best-offer lookup semantics:
        - `404` means the domain does not exist.
        - `200` with `offer = null` means the domain exists, but there are no active offers.
      parameters:
        - name: domain_name
          in: query
          required: true
          description: Required. Domain name for which the best active offer should be returned.
          schema:
            type: string
      responses:
        '200':
          description: Best offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BestOfferEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /offers/my:
    get:
      tags: [Offers]
      operationId: listMyOffers
      summary: Get incoming and outgoing offers for current authenticated user
      description: |
        `incoming` includes offers targeting domains currently controlled by the authenticated user,
        including domain-level quick-sale style multiple offers.
        Both `incoming` and `outgoing` contain only active, not-expired offers or offer rows.
      security:
        - AgentBearerAuth: []
      responses:
        '200':
          description: Incoming and outgoing offers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyOffersEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /users/search:
    get:
      tags: [Users]
      operationId: searchUsers
      summary: Search users
      description: |
        Searches users by a generic search string across supported identity fields.
        Results use the endpoint-defined deterministic search ranking for the current `search` value.
        Cursor contract:
        - `cursor` is an opaque server-generated continuation token.
        - The token is offset-based over the current ordered result set, not snapshot-based.
        - Reuse `next_cursor` only with the same `search` value.
        - If matching rows or ranking inputs change between requests, duplicates or skips are possible.
        - The end of the feed is indicated by `page_info.has_more = false` and `page_info.next_cursor = null`.
      parameters:
        - name: search
          in: query
          required: true
          description: Required free-form search string matched against supported public user identity fields.
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: User search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /users/{address}:
    get:
      tags: [Users]
      operationId: getUser
      summary: Get public user profile and stats
      description: |
        This endpoint accepts optional bearer authentication.
        When the caller is authenticated, viewer-dependent fields are resolved relative to that viewer.
        For unauthenticated requests:
        - `viewer_context.is_owner = false`
        - `viewer_context.is_watching = false`
        - `subscription = null`
      security:
        - {}
        - AgentBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserAddressPath'
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /users/{address}/activity:
    get:
      tags: [Users]
      operationId: listUserActivity
      summary: Get user-related transaction history
      description: |
        Results are ordered by chain position descending: `lt DESC`, then `tx_hash DESC`.
        Cursor contract:
        - `cursor` is an opaque server-generated continuation token.
        - The token is offset-based over the current ordered result set, not snapshot-based.
        - Reuse `next_cursor` only with the same request parameters.
        - If matching rows are inserted, removed, or reordered between requests, duplicates or skips are possible.
        - The end of the feed is indicated by `page_info.has_more = false` and `page_info.next_cursor = null`.
      parameters:
        - $ref: '#/components/parameters/UserAddressPath'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: User activity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /analytics/market/overview:
    get:
      tags: [Analytics]
      operationId: getMarketOverview
      summary: Get market overview analytics
      description: |
        Returns analytics derived from a precomputed snapshot.
        The response is not transactionally real-time.
        `snapshot_updated_at` is the snapshot generation timestamp exposed by the API.
      parameters:
        - $ref: '#/components/parameters/RequiredDomainZone'
      responses:
        '200':
          description: Market overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketOverviewEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /analytics/market/charts:
    get:
      tags: [Analytics]
      operationId: getMarketCharts
      summary: Get market chart data
      description: |
        Returns analytics derived from a precomputed snapshot.
        The response is not transactionally real-time.
        `snapshot_updated_at` is the snapshot generation timestamp exposed by the API.
      parameters:
        - $ref: '#/components/parameters/RequiredDomainZone'
      responses:
        '200':
          description: Market charts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketChartsEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
