  /analytics/prices/jettons:
    get:
      tags: [Analytics]
      operationId: getJettonPrices
      summary: Get jetton price baselines
      description: |
        Returns the latest jetton price snapshot exposed by the API.
        `source_timestamp` is the timestamp of the upstream price source snapshot used for these values.
        `generated_at` is the timestamp when this response payload was generated.
      responses:
        '200':
          description: Jetton prices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JettonPricesEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /history/transactions:
    get:
      tags: [History]
      operationId: listTransactions
      summary: Get global transaction feed
      description: |
        Cursor contract:
        - `cursor` is an opaque server-generated continuation token.
        - The token is offset-based over the current ordered result set, not snapshot-based.
        - Reuse `next_cursor` only with the same `sort` and the same filter set.
        - Reusing a cursor with a different `sort` returns `400`.
        - If matching rows are inserted, removed, or reordered between requests, duplicates or skips are possible.
        - The end of the feed is indicated by `page_info.has_more = false` and `page_info.next_cursor = null`.
        Ordering details:
        - `time.*` sorts are ordered by chain position using `lt` and `tx_hash`.
        - `domain.*` sorts use `domain_name` with `lt` and `tx_hash` as deterministic tie-breakers.
        - `price_ton.*` sorts use normalized TON value rather than a raw response field, with `lt` and `tx_hash` as deterministic tie-breakers.
        - `price_ton.asc|desc` excludes rows that do not have a normalized TON price before sorting is applied; this is filtering, not `nulls_last`.
      parameters:
        - name: types
          in: query
          style: form
          explode: true
          description: Optional transaction action-type filters. Multiple values are combined with OR semantics.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/DomainActionType'
        - name: domain_name
          in: query
          description: Optional exact domain-name filter.
          schema:
            type: string
        - $ref: '#/components/parameters/DomainZone'
        - name: deal_address
          in: query
          description: Optional filter by deal contract address.
          schema:
            $ref: '#/components/schemas/AddressObject'
        - name: user_address
          in: query
          description: Optional filter for transactions involving the specified wallet address.
          schema:
            $ref: '#/components/schemas/AddressObject'
        - name: only_webdom
          in: query
          description: Optional flag restricting the feed to transactions attributed to Webdom.
          schema:
            type: boolean
            default: false
        - $ref: '#/components/parameters/PriceTonMin'
        - $ref: '#/components/parameters/PriceTonMax'
        - $ref: '#/components/parameters/AfterTime'
        - $ref: '#/components/parameters/BeforeTime'
        - name: sort
          in: query
          description: Feed ordering mode. Reuse any returned cursor only with the same sort value.
          schema:
            type: string
            enum:
              - time.desc
              - time.asc
              - price_ton.desc
              - price_ton.asc
              - domain.asc
              - domain.desc
            default: time.desc
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Transaction feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /history/auctions/bids:
    get:
      tags: [History]
      operationId: listAuctionBids
      summary: Get global auction bid feed
      description: |
        Results are ordered by chain position descending: `lt DESC`, then `tx_hash DESC`.
        Cursor contract:
        - `cursor` is an opaque server-generated continuation token.
        - The token is offset-based over the current ordered result set, not snapshot-based.
        - Reuse `next_cursor` only with the same request parameters.
        - If matching rows are inserted, removed, or reordered between requests, duplicates or skips are possible.
        - The end of the feed is indicated by `page_info.has_more = false` and `page_info.next_cursor = null`.
      parameters:
        - $ref: '#/components/parameters/AfterTime'
        - $ref: '#/components/parameters/BeforeTime'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Auction bid feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /history/sales:
    get:
      tags: [History]
      operationId: listSales
      summary: Get global completed sale feed
      description: |
        Results are ordered by chain position descending: `lt DESC`, then `tx_hash DESC`.
        Cursor contract:
        - `cursor` is an opaque server-generated continuation token.
        - The token is offset-based over the current ordered result set, not snapshot-based.
        - Reuse `next_cursor` only with the same filter set.
        - If matching rows are inserted, removed, or reordered between requests, duplicates or skips are possible.
        - The end of the feed is indicated by `page_info.has_more = false` and `page_info.next_cursor = null`.
      parameters:
        - $ref: '#/components/parameters/AfterTime'
        - $ref: '#/components/parameters/BeforeTime'
        - $ref: '#/components/parameters/DomainZone'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Completed sale feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

components:
  securitySchemes:
    AgentBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Token
      description: |
        Agent-scoped bearer token issued after successful TON Proof verification.

  parameters:
    DomainNamePath:
      name: domain_name
      in: path
      required: true
      description: Canonical domain name, including zone suffix, for example `alice.ton` or `alice.t.me`.
      schema:
        type: string
    DealAddressPath:
      name: deal_address
      in: path
      required: true
      description: Deal contract address in user-friendly TON address format.
      schema:
        $ref: '#/components/schemas/AddressObject'
    OfferAddressPath:
      name: offer_address
      in: path
      required: true
      description: Offer contract address in user-friendly TON address format.
      schema:
        $ref: '#/components/schemas/AddressObject'
    UserAddressPath:
      name: address
      in: path
      required: true
      description: User wallet address in user-friendly TON address format.
      schema:
        $ref: '#/components/schemas/AddressObject'
    Search:
      name: search
      in: query
      description: Free-form search string interpreted by the target endpoint.
      schema:
        type: string
    Regex:
      name: regex
      in: query
      description: Optional case-insensitive regular expression matched against the full domain name. When combined with `search`, both filters are applied.
      schema:
        type: string
        minLength: 1
    DomainZone:
      name: domain_zone
      in: query
      description: Optional domain zone filter. Use `ton` for `.ton` domains or `t.me` for Telegram usernames.
      schema:
        type: string
        enum: [ton, t.me]
    RequiredDomainZone:
      name: domain_zone
      in: query
      required: true
      description: Required domain zone selector. Use `ton` for `.ton` domains or `t.me` for Telegram usernames.
      schema:
        type: string
        enum: [ton, t.me]
    PriceTonMin:
      name: price_ton_min
      in: query
      description: Optional inclusive lower bound for normalized TON price, in human-readable TON units such as `10.1`.
      schema:
        type: string
        pattern: '^\\d+(\\.\\d+)?$'
    PriceTonMax:
      name: price_ton_max
      in: query
      description: Optional inclusive upper bound for normalized TON price, in human-readable TON units such as `10.1`.
      schema:
        type: string
        pattern: '^\\d+(\\.\\d+)?$'
    SortCatalogDomains:
      name: sort
      in: query
      description: Domain ordering mode. Reuse any returned cursor only with the same sort value. For `current_price_ton.*`, `last_price_ton.*`, `last_sale_time.*`, `sale_created_at.*`, and `deal_ending_time.*`, rows without the sort key are always placed at the end of the result set (`nulls_last`), regardless of sort direction.
      schema:
        type: string
        enum:
          - relevance.desc
          - name.asc
          - name.desc
          - name_length.asc
          - name_length.desc
          - last_renewal_time.desc
          - last_renewal_time.asc
          - registration_time.desc
          - registration_time.asc
          - current_price_ton.desc
          - current_price_ton.asc
          - last_price_ton.desc
          - last_price_ton.asc
          - last_sale_time.desc
          - last_sale_time.asc
          - last_price_difference_ton.desc
          - last_price_difference_ton.asc
          - sale_created_at.asc
          - sale_created_at.desc
          - deal_ending_time.asc
          - watchlists_count.desc
        default: relevance.desc
    Cursor:
      name: cursor
      in: query
      description: |
        Opaque server-generated continuation token for cursor pagination.
        For offset-based feeds in this API, the token binds to the endpoint ordering and, where applicable, to the explicit `sort` value.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      description: Optional page size. Default is `50`; maximum is `100`.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    AfterTime:
      name: after_time
      in: query
      description: Optional inclusive lower bound for event or transaction timestamp.
      schema:
        type: string
        format: date-time
    BeforeTime:
      name: before_time
      in: query
      description: Optional inclusive upper bound for event or transaction timestamp.
      schema:
        type: string
        format: date-time

  responses:
    BadRequest:
      description: Invalid request parameters or payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Authentication required or token is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Requested resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    ServiceUnavailable:
      description: Required backend dependency is temporarily unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until the next request is allowed for the scope that exceeded the rate limit.
          schema:
            type: integer
            minimum: 1
        X-RateLimit-Limit:
          description: Burst size for the scope that exceeded the rate limit.
          schema:
            type: integer
            minimum: 1
        X-RateLimit-Remaining:
          description: Remaining whole requests currently available in the bucket for the exceeded scope.
          schema:
            type: integer
            minimum: 0
        X-RateLimit-Reset:
          description: Seconds until the next request is allowed for the exceeded scope.
          schema:
            type: integer
            minimum: 1
        X-RateLimit-Scope:
          description: Scope that exceeded the rate limit.
          schema:
            type: string
            enum: [wallet, ip]
        X-RateLimit-Policy:
          description: Applied rate-limit policy string, for example `5rps; burst=20`.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    TonProofChallenge:
      type: object
      properties:
        challenge_id:
          type: string
          format: uuid
        payload:
          type: string
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
      required:
        - challenge_id
        - payload
        - issued_at
        - expires_at

    TonProofDomain:
      type: object
      properties:
        lengthBytes:
          type: integer
        value:
          type: string
      required: [lengthBytes, value]

    TonProofProof:
      type: object
      properties:
        timestamp:
          type: integer
        domain:
          $ref: '#/components/schemas/TonProofDomain'
        payload:
          type: string
        signature:
          type: string
          description: Base64-encoded TON Proof signature.
        state_init:
          type: string
          nullable: true
      required: [timestamp, domain, payload, signature]

    TonProofTokenExchangeRequest:
      type: object
      properties:
        challenge_id:
          type: string
          format: uuid
        wallet_address:
          $ref: '#/components/schemas/AddressObject'
        wallet_public_key:
          type: string
          pattern: '^(0x)?[0-9a-fA-F]{64}$'
          description: Hex-encoded wallet public key.
        proof:
          $ref: '#/components/schemas/TonProofProof'
        expires_in_seconds:
          type: integer
          minimum: 300
          nullable: true
          description: Optional token TTL. If omitted, the server default is used.
      required:
        - challenge_id
        - wallet_address
        - wallet_public_key
        - proof

    AgentApiToken:
      type: object
      properties:
        token_type:
          type: string
          enum: [Bearer]
        access_token:
          type: string
          description: Returned only at token creation time.
        wallet_address:
          $ref: '#/components/schemas/AddressObject'
        expires_at:
          type: string
          format: date-time
          nullable: true
      required:
        - token_type
        - access_token
        - wallet_address
        - expires_at

    TokenRevocationResult:
      type: object
      properties:
        revoked:
          type: boolean
        revoked_at:
          type: string
          format: date-time
      required: [revoked, revoked_at]

    CurrencyCode:
      type: string
      enum: [TON, USDT, WEB3]

    DomainZoneValue:
      type: string
      enum: [ton, t.me]

    DomainStateFilter:
      type: string
      enum:
        - for_primary_auction
        - for_sale
        - for_secondary_auction
        - not_for_sale
        - collection
        - expired
        - for_auction_with_bids

    CharacterFilter:
      type: string
      description: Character-set filter for the domain label. Invalid combinations are `idn_domains` + `exclude_punycode`, `digits_only` + `exclude_digits`, `letters_only` + `digits_only`, `with_hyphens` + `exclude_hyphens`, and `hyphen_separated` + `exclude_hyphens`.
      enum:
        - exclude_hyphens
        - exclude_digits
        - idn_domains
        - exclude_punycode
        - digits_only
        - letters_only
        - with_hyphens
        - hyphen_separated

    DnsRecordType:
      type: string
      enum: [wallet, ton_storage, ton_site]

    DealType:
      type: string
      enum:
        - fix_price_sale
        - auction
        - domains_swap

    OfferType:
      type: string
      enum: [purchase_offer, multiple_offer]

    DealState:
      type: string
      enum: [uninitialized, active, completed, cancelled]

    OfferState:
      type: string
      enum: [active, completed, cancelled, inactive]

    DomainActionType:
      type: string
      enum:
        - primary_purchase
        - secondary_purchase
        - put_on_sale
        - cancel_sale
        - put_on_auction
        - dns_auction_bid
        - cancel_auction
        - transfer
        - renew
        - change_records
        - change_sale_price

    AddressObject:
      type: string
      description: Canonical user-friendly TON address string used across the public API.
      minLength: 48
      maxLength: 48
      pattern: '^[A-Za-z0-9_-]{48}$'

    Money:
      type: object
      properties:
        amount:
          type: string
        decimals:
          type: integer
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        amount_decimal:
          type: number
          format: double
          description: Human-readable decimal amount in the currency's major units, for example `10.1`.
      required: [amount, decimals, currency, amount_decimal]

    Meta:
      type: object
      properties:
        request_id:
          type: string
        api_version:
          type: string
      required: [request_id, api_version]

    PageInfo:
      type: object
      properties:
        next_cursor:
          type: string
          nullable: true
          description: "Opaque continuation token for the next page. `null` when there is no next page."
        has_more:
          type: boolean
          description: "`true` when another page is available for the same query and ordering."
      required: [next_cursor, has_more]

    ErrorObject:
      type: object
      properties:
        code:
          type: string
          enum:
            - INVALID_ARGUMENT
            - UNAUTHORIZED
            - NOT_FOUND
            - TOO_MANY_REQUESTS
            - INTERNAL_ERROR
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        retryable:
          type: boolean
        blocking_issues:
          type: array
          items:
            type: string
        suggested_fixes:
          type: array
          items:
            type: string
      required: [code, message]

    ErrorEnvelope:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/ErrorObject'
        meta:
          $ref: '#/components/schemas/Meta'
