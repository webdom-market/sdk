name: CI

on:
    push:
        branches:
            - '**'
        tags-ignore:
            - 'v*'
    pull_request:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: OpenAPI lint
              run: npm run openapi:lint

            - name: OpenAPI source sync check
              run: npm run openapi:sync-check
              env:
                  WEBDOM_BACK_OPENAPI_URL: https://webdom.market/api/docs/agent-api/openapi.yaml
                  WEBDOM_OPENAPI_SYNC_STRICT: '1'

            - name: SDK OpenAPI verify
              run: npm run openapi:verify

            - name: Lint
              run: npm run lint

            - name: Type check
              run: npm run check

            - name: Test
              run: npm test

            - name: Build
              run: npm run build

            - name: Pack dry run
              run: npm run pack:dry-run

            - name: Package consumer verify
              run: npm run pack:verify
