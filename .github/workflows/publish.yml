name: Publish

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

concurrency:
    group: publish-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: npm-publish
        env:
            NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  registry-url: 'https://registry.npmjs.org'
                  cache: npm

            - name: Show tool versions
              run: |
                  node --version
                  npm --version

            - name: Install dependencies
              run: npm ci

            - name: OpenAPI lint
              run: npm run openapi:lint

            - name: OpenAPI source sync check
              run: npm run openapi:sync-check
              env:
                  WEBDOM_BACK_OPENAPI_URL: https://webdom.market/api/docs/agent-api/openapi.yaml
                  WEBDOM_OPENAPI_SYNC_STRICT: '1'

            - name: SDK OpenAPI verify
              run: npm run openapi:verify

            - name: Lint
              run: npm run lint

            - name: Type check
              run: npm run check

            - name: Test
              run: npm test

            - name: Build
              run: npm run build

            - name: Pack dry run
              run: npm run pack:dry-run

            - name: Package consumer verify
              run: npm run pack:verify

            - name: Verify tag matches package version
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  PACKAGE_VERSION=$(node -p "require('./package.json').version")
                  TAG_VERSION="${GITHUB_REF_NAME#v}"
                  if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
                    echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
                    exit 1
                  fi

            - name: Publish to npm with token
              if: ${{ env.NPM_TOKEN != '' }}
              run: npm publish --access public
              env:
                  NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

            - name: Publish to npm with trusted publishing
              if: ${{ env.NPM_TOKEN == '' }}
              run: npm publish --access public
